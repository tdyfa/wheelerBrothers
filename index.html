<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Outils Atelier</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Outils Atelier">
<meta name="theme-color" content="#0f1216">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<style>
  :root{--ink:#111418; --muted:#6b7280; --line:#e3e7ee; --bg:#eef1f5; --card:#ffffff;}
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0; display:flex; align-items:center; justify-content:center;
    font-family:"Helvetica Neue",Arial,"Segoe UI",sans-serif; background:var(--bg); color:var(--ink);
    padding:24px; padding-top:max(24px, env(safe-area-inset-top));
    padding-bottom:max(24px, env(safe-area-inset-bottom));
  }
  .box{
    background:var(--card); border:1px solid var(--line); border-radius:20px;
    box-shadow:0 6px 24px rgba(16,24,40,.10); padding:34px 28px; width:100%; max-width:420px; text-align:center;
  }
  .brand-logo{display:block; width:min(280px,82%); height:auto; margin:0 auto 30px;}
  a.tool{
    display:block; width:100%; padding:16px; margin-bottom:12px; border-radius:12px;
    font-size:15.5px; font-weight:700; cursor:pointer; text-decoration:none;
  }
  a.tool.primary, a.tool.secondary{background:transparent; color:var(--ink); border:1px solid var(--line);}
  a.tool:active{background:#f4f6f9;}
  .version{font-size:11.5px; color:var(--muted); font-weight:600; margin-top:18px;}
</style>
</head>
<body>
  <div class="box">
    <img class="brand-logo" src="report-cover-logo.png" alt="Wheeler Brothers">
    <a class="tool secondary" href="atelier.html">Carnet d'atelier</a>
    <a class="tool secondary" href="rapport.html">Générateur de rapport</a>
    <a class="tool secondary" href="inventaire.html">Inventaire</a>
    <button type="button" id="btnResetCode" style="background:none;border:none;color:var(--muted);font-size:11.5px;text-decoration:underline;cursor:pointer;padding:0;margin-top:4px;">Changer le code d'atelier</button>
    <div class="version">Version 43</div>
  </div>
<script>
  document.getElementById('btnResetCode').addEventListener('click', resetSharedCode);
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
