<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Carnet d'atelier</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Carnet d'atelier">
<meta name="theme-color" content="#0f1216">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --ink:#111418; --ink-soft:#3b4250; --muted:#6b7280; --line:#e3e7ee;
    --accent:#111418; --bg:#eef1f5; --card:#ffffff; --field:#f6f8fb;
    --ok:#1f7a3d; --warn:#b3261e;
    --shadow:0 1px 2px rgba(16,24,40,.06),0 6px 22px rgba(16,24,40,.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Helvetica Neue",Arial,"Segoe UI",sans-serif;
    color:var(--ink); background:var(--bg); -webkit-font-smoothing:antialiased;
  }

  .app-bar{
    position:sticky; top:0; z-index:50;
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    padding:10px 20px; background:#0f1216; color:#fff;
    box-shadow:0 2px 10px rgba(0,0,0,.18);
  }
  .app-bar img{height:28px; width:auto; display:block;}
  .app-bar h1{font-size:15px; margin:0; font-weight:700; letter-spacing:.3px}
  .app-bar .sub{font-size:12px; color:#9aa3b2; margin-right:auto}

  .wrap{display:flex; gap:24px; align-items:flex-start; padding:24px; max-width:1400px; margin:0 auto}
  @media (max-width:900px){ .wrap{flex-direction:column} }

  /* ---- Sidebar ---- */
  .sidebar{flex:0 0 300px; max-width:300px; width:100%}
  @media (min-width:901px){
    .sidebar{position:sticky; top:58px; align-self:flex-start; max-height:calc(100vh - 74px); overflow-y:auto; padding-right:4px;}
  }
  @media (max-width:900px){ .sidebar{flex:1 1 auto; max-width:none} }

  .card{background:var(--card); border:1px solid var(--line); border-radius:14px; box-shadow:var(--shadow); margin-bottom:18px; overflow:hidden}
  .card > h2{font-size:13px; text-transform:uppercase; letter-spacing:.8px; color:var(--muted); margin:0; padding:14px 16px; border-bottom:1px solid var(--line); background:#fafbfd}
  .card .body{padding:16px}

  label{display:block; font-size:12px; font-weight:600; color:var(--ink-soft); margin:0 0 5px}
  input[type=text], input[type=date], input[type=number], textarea, select{
    width:100%; border:1px solid var(--line); background:var(--field);
    border-radius:9px; padding:9px 11px; font-size:14px; color:var(--ink); font-family:inherit;
  }
  input:focus, textarea:focus, select:focus{outline:none; border-color:#9aa3b2; background:#fff}
  .field{margin-bottom:12px}
  .field:last-child{margin-bottom:0}

  #search{margin-bottom:2px}

  .vehicle-list{list-style:none; margin:0; padding:8px 8px 4px; max-height:520px; overflow-y:auto;}
  .vehicle-item{
    display:flex; justify-content:space-between; align-items:center; gap:8px;
    padding:10px 8px; border-radius:9px; cursor:pointer;
  }
  .vehicle-item:hover{background:var(--field);}
  .vehicle-item.active{background:var(--ink); }
  .vehicle-item.active .vname, .vehicle-item.active .vmeta{color:#fff;}
  .vname{font-weight:700; font-size:14px; display:block;}
  .vmeta{font-size:11.5px; color:var(--muted); display:block; margin-top:1px;}
  .vcount{
    font-size:11px; font-weight:700; background:var(--field); color:var(--ink-soft);
    padding:2px 8px; border-radius:20px; flex-shrink:0; border:1px solid var(--line);
  }
  .vehicle-item.active .vcount{background:rgba(255,255,255,.15); color:#fff; border-color:transparent;}
  .empty-note{font-size:12.5px; color:var(--muted); padding:12px 8px;}

  .btn{
    border:0; border-radius:9px; padding:10px 16px; font-size:13.5px; font-weight:700;
    cursor:pointer; background:var(--ink); color:#fff; transition:.15s; font-family:inherit;
  }
  .btn:hover{background:#272d36}
  .btn.ghost{background:transparent; border:1px solid var(--line); color:var(--ink-soft); font-weight:600;}
  .btn.ghost:hover{border-color:#9aa3b2; background:var(--field);}
  .btn.danger-outline{background:transparent; border:1px solid #e6b3ae; color:var(--warn); font-weight:600;}
  .btn.danger-outline:hover{background:#fbeceb;}
  .btn.block{width:100%}

  /* ---- Main ---- */
  .main{flex:1 1 auto; min-width:0}
  .main-empty{
    display:flex; align-items:center; justify-content:center; min-height:360px;
    color:var(--muted); text-align:center; padding:20px; font-size:14px;
  }

  .vhead{display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:16px; padding:18px 18px 6px;}
  .vhead h2{font-size:22px; margin:0 0 3px; letter-spacing:-.2px;}
  .vhead .moto{font-size:13px; color:var(--muted);}


  .vehicle-profile{padding:22px 20px 14px; border-bottom:1px solid var(--line);}
  .vehicle-profile-top{display:flex; justify-content:space-between; align-items:flex-start; gap:18px; flex-wrap:wrap;}
  .vehicle-identity{min-width:220px; flex:1;}
  .vehicle-title{font-size:24px; line-height:1.15; margin:0 0 12px; letter-spacing:-.3px;}
  .vehicle-facts{display:grid; gap:5px; font-size:13.5px; color:var(--ink-soft);}
  .vehicle-fact{display:flex; align-items:center; gap:8px;}
  .vehicle-fact strong{color:var(--ink);}
  .vehicle-km{margin-top:12px; font-size:18px; font-weight:800; color:var(--ink);}
  .vehicle-actions{display:flex; gap:10px; flex-wrap:wrap; padding:14px 20px 16px; border-bottom:1px solid var(--line);}
  .vehicle-actions .btn{flex:0 1 auto;}
  .operations-heading{padding:18px 20px 6px; font-size:14px; font-weight:800; color:var(--ink-soft);}
  @media (max-width:560px){
    .vehicle-profile{padding:20px 16px 12px;}
    .vehicle-title{font-size:22px;}
    .vehicle-actions{padding:12px 16px 14px;}
    .vehicle-actions .btn{flex:1 1 145px;}
    .operations-heading{padding:16px 16px 6px;}
  }
  .rate-flag{font-size:11.5px; margin-top:8px; font-weight:600;}
  .rate-ok{color:var(--ok);}
  .rate-warn{color:var(--warn);}

  .stats{display:flex; gap:10px; flex-wrap:wrap;}
  .stat{border:1px solid var(--line); border-radius:10px; padding:8px 14px; text-align:center; min-width:88px; background:#fafbfd;}
  .stat .num{font-size:19px; font-weight:800; line-height:1.1;}
  .stat .lbl{font-size:10px; text-transform:uppercase; color:var(--muted); letter-spacing:.4px; margin-top:2px;}


  /* ---- Statistiques annuelles ---- */
  .annual-stats-head{display:flex; justify-content:space-between; align-items:flex-end; gap:14px; flex-wrap:wrap; padding:20px; border-bottom:1px solid var(--line);}
  .annual-stats-head h2{margin:0 0 4px; font-size:23px;}
  .annual-stats-head p{margin:0; color:var(--muted); font-size:13px;}
  .annual-year-field{min-width:145px; margin:0;}
  .annual-stats-grid{display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; padding:20px;}
  .annual-stat-card{border:1px solid var(--line); border-radius:12px; background:#fafbfd; padding:18px; min-height:105px; display:flex; flex-direction:column; justify-content:center;}
  .annual-stat-value{font-size:27px; line-height:1.1; font-weight:800; color:var(--ink);}
  .annual-stat-label{font-size:12px; color:var(--muted); margin-top:6px; font-weight:650;}
  .annual-stats-note{margin:0 20px 20px; padding:12px 14px; border-radius:10px; background:var(--field); color:var(--ink-soft); font-size:12.5px; line-height:1.45;}
  @media(max-width:560px){
    .annual-stats-head{padding:18px 16px; align-items:stretch;}
    .annual-year-field{width:100%;}
    .annual-stats-grid{grid-template-columns:1fr; padding:16px;}
    .annual-stats-note{margin:0 16px 16px;}
  }

  table.ops{width:100%; border-collapse:collapse; font-size:13.5px;}
  table.ops th{
    text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.5px;
    color:var(--muted); border-bottom:1px solid var(--line); padding:8px 18px; background:#fafbfd;
  }
  table.ops td{padding:11px 18px; border-bottom:1px solid var(--line); vertical-align:top;}
  table.ops tr:hover td{background:#fafbfd;}
  .op-name{font-weight:700;}
  .op-notes{font-size:12px; color:var(--muted); margin-top:2px;}
  .num-cell{white-space:nowrap; font-variant-numeric:tabular-nums;}
  .del-btn{background:none; border:none; color:var(--muted); cursor:pointer; font-size:11.5px; text-decoration:underline; font-family:inherit;}
  .del-btn:hover{color:var(--warn);}

  .form-box{margin:18px; background:var(--field); border:1px solid var(--line); border-radius:12px; padding:16px;}
  .form-box h3{font-size:14px; margin:0 0 12px; color:var(--ink-soft);}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .grid3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px;}
  @media (max-width:560px){.grid2,.grid3{grid-template-columns:1fr;}}
  .form-actions{display:flex; gap:10px; margin-top:4px; flex-wrap:wrap;}
  .status-msg{font-size:12px; margin-top:8px; min-height:14px; font-weight:600;}
  .status-ok{color:var(--ok);}
  .status-err{color:var(--warn);}

  .footer-actions{padding:0 18px 18px;}

  .loading{color:var(--muted); padding:40px; text-align:center; font-size:13px;}
  /* ============ MOBILE (≤ 768px) ============ */
  .mobile-toggle{display:none}
  @media (max-width:768px){
    /* barre du haut : respecte la zone sûre iOS, défile normalement */
    .app-bar{
      position:static;
      gap:8px; padding:calc(10px + env(safe-area-inset-top)) 12px 10px;
    }
    .app-bar img{height:24px}
    .app-bar h1{font-size:14px; width:100%; margin-bottom:2px}
    .app-bar .sub{font-size:11px; margin-right:auto}
    .app-bar .btn{padding:8px 10px; font-size:12px}
    #syncWarn{width:100%; order:99}

    /* bascule Liste / Détail, collée en haut sous la Dynamic Island */
    .mobile-toggle{
      display:flex; position:sticky; top:0; z-index:60;
      background:#0f1216; gap:8px;
      padding:calc(8px + env(safe-area-inset-top)) 12px 10px;
    }
    .mobile-toggle button{
      flex:1; border:0; border-radius:9px; padding:11px; font-size:14px; font-weight:700;
      cursor:pointer; background:#2b3340; color:#fff;
    }
    .mobile-toggle button.active{background:#fff; color:#0f1216}

    .wrap{flex-direction:column; padding:12px; gap:0}
    .sidebar, .main{max-width:none; width:100%; flex:1 1 auto}
    .sidebar{position:static; max-height:none; overflow:visible; padding-right:0}

    /* affiche liste OU détail selon la vue */
    body[data-mview="detail"] .sidebar{display:none}
    body[data-mview="list"] .main{display:none}

    /* stats : 2 colonnes pour tenir sur l'écran */
    .vhead{flex-direction:column; padding:16px 16px 4px}
    .stats{width:100%; display:grid; grid-template-columns:1fr 1fr; gap:8px}
    .stat{min-width:0}

    /* tableau des interventions -> cartes empilées */
    table.ops, table.ops thead, table.ops tbody, table.ops tr, table.ops td{display:block; width:100%}
    table.ops thead{display:none}
    table.ops{font-size:14px}
    table.ops tr{
      border:1px solid var(--line); border-radius:10px; margin-bottom:10px;
      padding:6px 4px; background:#fff;
    }
    table.ops td{
      border:none; padding:6px 12px; display:flex; justify-content:space-between; gap:12px; text-align:right;
    }
    table.ops td::before{
      content:attr(data-label); font-weight:600; color:var(--muted); font-size:12px;
      text-align:left; flex:0 0 auto;
    }
    /* la cellule Opération : label au-dessus, texte aligné à gauche */
    table.ops td[data-label="Opération"]{flex-direction:column; text-align:left; gap:2px}
    table.ops td[data-label="Opération"]::before{margin-bottom:2px}
    .op-name{font-weight:700}
    /* boutons d'action pleine largeur */
    table.ops td.ops-actions{justify-content:flex-end; padding-top:8px; border-top:1px solid var(--line); margin-top:4px}
    table.ops td.ops-actions::before{content:none}
    /* on retire le conteneur scroll horizontal devenu inutile */
    .ops-scroll{overflow-x:visible !important; border:none !important; border-radius:0 !important; margin-top:0 !important}

    .grid2, .grid3{grid-template-columns:1fr}
  }


  /* ---- Historique imprimable d'un véhicule ---- */
  #historyPrint{display:none}
  @media print{
    @page{size:A4; margin:0}
    body.history-printing{background:#fff !important; color:#111 !important}
    body.history-printing > *:not(#historyPrint){display:none !important}
    body.history-printing #historyPrint{display:block !important}
    .history-sheet{box-sizing:border-box; padding:14mm; font-family:"Helvetica Neue",Arial,"Segoe UI",sans-serif; color:#111; font-size:11pt; line-height:1.42}
    .history-header{position:relative; border-bottom:3px solid #111; padding:0 90px 12px 0; margin-bottom:18px}
    .history-logo{position:absolute; top:0; right:0; width:72px; height:72px; object-fit:contain}
    .history-kicker{font-size:9pt; font-weight:800; letter-spacing:1.4px; text-transform:uppercase; color:#555}
    .history-title{font-size:24pt; line-height:1.1; margin:4px 0 12px}
    .history-vehicle{font-size:15pt; font-weight:800; margin-bottom:5px}
    .history-meta{display:grid; grid-template-columns:1fr 1fr; gap:5px 18px; font-size:10pt}
    .history-meta strong{font-weight:800}
    .history-summary{margin:16px 0; padding:10px 12px; border:1px solid #d9dde4; border-radius:8px; background:#f7f8fa}
    .history-table{width:100%; border-collapse:collapse; table-layout:fixed}
    .history-table thead{display:table-header-group}
    .history-table tr{break-inside:avoid; page-break-inside:avoid}
    .history-table th{padding:8px 7px; text-align:left; border-bottom:2px solid #111; font-size:9pt; text-transform:uppercase; letter-spacing:.5px}
    .history-table td{padding:10px 7px; vertical-align:top; border-bottom:1px solid #d9dde4}
    .history-table .h-date{width:22%; white-space:nowrap; font-weight:700}
    .history-table .h-km{width:18%; white-space:nowrap}
    .history-op-title{font-weight:800; margin-bottom:3px}
    .history-op-notes{font-size:9.5pt; color:#444; white-space:pre-wrap}
  }
</style>
</head>

function uid(){ return 'v' + Date.now() + Math.random().toString(16).slice(2,8); }

function captureFormState(){
  const ids = ['opDate','opKm','opTemps','opOperation','opRemu','opNotes','editModele','editMoto','editPlate','editOwner'];
  const captured = {};
  let anyFocused = false;
  ids.forEach(id=>{
    const el = document.getElementById(id);
    if(el){
      captured[id] = el.value;
      if(document.activeElement === el) anyFocused = true;
    }
  });
  captured._hadFocus = anyFocused;
  return captured;
}

function restoreFormState(captured){
  if(!captured) return;
  Object.keys(captured).forEach(id=>{
    if(id === '_hadFocus') return;
    const el = document.getElementById(id);
    if(el) el.value = captured[id];
  });
}

function renderMainPreservingForm(){
  const captured = captureFormState();
  renderMain();
  if(captured._hadFocus) restoreFormState(captured);
}

function flagSyncError(customMsg){
  const el = document.getElementById('syncWarn');
  if(el){
    el.textContent = customMsg || "⚠️ Synchronisation impossible (code d'atelier ou réseau) → tes modifications restent sur ce téléphone uniquement";
    el.style.display = 'inline';
  }
}
function clearSyncError(){
  const el = document.getElementById('syncWarn');
  if(el) el.style.display = 'none';
}

async function loadData(){
  const docRef = sharedDocRef('atelier');
  docRef.onSnapshot((snap)=>{
    clearSyncError();
    if(snap.exists){
      const remote = snap.data();
      try{
        DATA = remote.payload ? JSON.parse(remote.payload) : { vehicles: [] };
      }catch(e){ DATA = { vehicles: [] }; }
      if(!DATA.vehicles) DATA.vehicles = [];
    } else {
      DATA = { vehicles: [] };
    }
    const loadingMsg = document.getElementById('loadingMsg');
    if(loadingMsg) loadingMsg.remove();
    renderSidebar();
    renderMainPreservingForm();
  }, (err)=>{
    console.error('Synchronisation impossible', err);
    const loadingMsg = document.getElementById('loadingMsg');
    if(loadingMsg) loadingMsg.remove();
    flagSyncError();
  });
}

async function saveData(){
  try{
    const docRef = sharedDocRef('atelier');
    await docRef.set({ payload: JSON.stringify(DATA), updatedAt: Date.now() });
    clearSyncError();
    return true;
  }catch(e){
    console.error('Erreur de synchronisation', e);
    flagSyncError();
    return false;
  }
}

function exportData(){
  const blob = new Blob([JSON.stringify(DATA, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const stamp = new Date().toISOString().slice(0,10);
  a.download = `carnet-atelier_${stamp}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function importData(file){
  const reader = new FileReader();
  reader.onload = async () => {
    try{
      const parsed = JSON.parse(reader.result);
      if(!parsed || !Array.isArray(parsed.vehicles)) throw new Error('format invalide');
      const replace = confirm(
        `Ce fichier contient ${parsed.vehicles.length} fiche(s) véhicule.\n\n` +
        `OK = remplacer entièrement tes données actuelles par ce fichier.\n` +
        `Annuler = fusionner (les fiches du fichier s'ajoutent à celles déjà présentes).`
      );
      if(replace){
        DATA = parsed;
      } else {
        const existingIds = new Set(DATA.vehicles.map(v=>v.id));
        parsed.vehicles.forEach(v=>{
          if(!existingIds.has(v.id)) DATA.vehicles.push(v);
        });
      }
      const ok = await saveData();
      if(!ok){
        alert("Échec de l'enregistrement dans l'espace partagé. Vérifie ton code d'atelier ou ta connexion, puis réessaie l'import.");
        return;
      }
      currentVehicleId = null;
      renderSidebar();
      renderMain();
      alert('Import terminé.');
    }catch(e){
      alert("Ce fichier n'est pas un export valide du carnet d'atelier.");
    }
  };
  reader.readAsText(file);
}

function fmtEuro(n){ return n.toLocaleString('fr-FR',{minimumFractionDigits:0, maximumFractionDigits:2}) + ' €'; }
function fmtH(n){ return n.toLocaleString('fr-FR',{minimumFractionDigits:0, maximumFractionDigits:2}) + ' h'; }

function vehicleStats(v){
  const totalTemps = v.ops.reduce((s,o)=>s+Number(o.temps||0),0);
  const totalRemu = v.ops.reduce((s,o)=>s+Number(o.remuneration||0),0);
  const taux = totalTemps > 0 ? totalRemu/totalTemps : null;
  return { totalTemps, totalRemu, taux, count: v.ops.length };
}

function globalAvgRate(){
  let t=0, r=0;
  DATA.vehicles.forEach(v=>v.ops.forEach(o=>{t+=Number(o.temps||0); r+=Number(o.remuneration||0);}));
  return t>0 ? r/t : null;
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s == null ? '' : String(s);
  return d.innerHTML;
}

function operationDateValue(operation){
  const value = String((operation && operation.date) || '').trim();
  if(!value) return 0;
  const isoDate = value.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(isoDate){
    return Date.UTC(Number(isoDate[1]), Number(isoDate[2]) - 1, Number(isoDate[3]));
  }
  const parsed = Date.parse(value);
  return Number.isNaN(parsed) ? 0 : parsed;
}

function latestVehicleOperationDate(v){
  return (v.ops || []).reduce((latest, operation)=>{
    return Math.max(latest, operationDateValue(operation));
  }, 0);
}

function renderSidebar(){
  const list = document.getElementById('vehicleList');
  list.innerHTML = '';
  const term = searchTerm.trim().toLowerCase();
  const filtered = DATA.vehicles
    .filter(v => !term || (v.modele+' '+v.motorisation+' '+(v.plate||'')+' '+(v.owner||'')).toLowerCase().includes(term))
    .sort((a,b)=>{
      const operationDateDiff = latestVehicleOperationDate(b) - latestVehicleOperationDate(a);
      if(operationDateDiff !== 0) return operationDateDiff;
      return (b.updatedAt||0) - (a.updatedAt||0);
    });

  if(filtered.length === 0){
    const li = document.createElement('div');
    li.className = 'empty-note';
    li.textContent = DATA.vehicles.length === 0
      ? "Aucune fiche pour l'instant. Crée la première."
      : 'Aucun résultat.';
    list.appendChild(li);
    return;
  }

  filtered.forEach(v=>{
    const li = document.createElement('li');
    li.className = 'vehicle-item' + (v.id === currentVehicleId ? ' active' : '');
    li.innerHTML = `
      <div>
        <span class="vname">${escapeHtml(v.modele)}${v.owner ? ` - ${escapeHtml(v.owner)}` : ''}</span>
        <span class="vmeta">${escapeHtml(v.motorisation)}${v.plate ? ` · ${escapeHtml(v.plate)}` : ''}</span>
      </div>
      <span class="vcount">${v.ops.length}</span>
    `;
    li.addEventListener('click', ()=>{ currentVehicleId = v.id; editingVehicleMode = false; editingOpId = null; renderSidebar(); renderMain(); if(isMobileAtelier()) setMobileViewAtelier('detail'); });
    list.appendChild(li);
  });
}


function formatHistoryDate(value){
  if(!value) return 'Date non renseignée';
  const d = new Date(String(value) + (String(value).includes('T') ? '' : 'T00:00:00'));
  return Number.isNaN(d.getTime()) ? String(value) : d.toLocaleDateString('fr-FR');
}

function cleanHistoryNotes(value){
  return String(value||'')
    .split(' — ')
    .filter(part=>!/^Rapport lié\s*:/i.test(part.trim()))
    .join(' — ')
    .trim();
}

function safeFilePart(value){
  return String(value||'vehicule')
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-zA-Z0-9_-]+/g,'_')
    .replace(/^_+|_+$/g,'') || 'vehicule';
}

function loadHistoryImage(src){
  return new Promise((resolve, reject)=>{
    const img = new Image();
    img.onload = ()=>resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

function historyTextLines(ctx, text, maxWidth){
  const paragraphs = String(text||'').split(/\n/);
  const lines = [];
  paragraphs.forEach((paragraph, pIndex)=>{
    const words = paragraph.split(/\s+/).filter(Boolean);
    if(words.length === 0){
      lines.push('');
    }else{
      let line = '';
      words.forEach(word=>{
        const test = line ? `${line} ${word}` : word;
        if(line && ctx.measureText(test).width > maxWidth){
          lines.push(line);
          line = word;
        }else{
          line = test;
        }
      });
      if(line) lines.push(line);
    }
    if(pIndex < paragraphs.length - 1) lines.push('');
  });
  return lines;
}

function drawHistoryLines(ctx, lines, x, y, lineHeight, maxLines){
  const count = typeof maxLines === 'number' ? Math.min(lines.length, maxLines) : lines.length;
  for(let i=0;i<count;i++) ctx.fillText(lines[i], x, y + i*lineHeight);
  return y + count*lineHeight;
}

function base64Bytes(dataUrl){
  const binary = atob(dataUrl.split(',')[1]);
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}

function buildImagePdf(jpegPages, pageWidthPt=595.28, pageHeightPt=841.89){
  const encoder = new TextEncoder();
  const chunks = [];
  const offsets = [0];
  let length = 0;
  const pushBytes = bytes=>{ chunks.push(bytes); length += bytes.length; };
  const pushText = text=>pushBytes(encoder.encode(text));
  const pageCount = jpegPages.length;
  const objectCount = 2 + pageCount * 3;

  pushText('%PDF-1.4\n%âãÏÓ\n');
  const writeObject = (id, parts)=>{
    offsets[id] = length;
    pushText(`${id} 0 obj\n`);
    parts();
    pushText('\nendobj\n');
  };

  writeObject(1, ()=>pushText('<< /Type /Catalog /Pages 2 0 R >>'));
  const pageIds = jpegPages.map((_,i)=>3+i*3);
  writeObject(2, ()=>pushText(`<< /Type /Pages /Count ${pageCount} /Kids [${pageIds.map(id=>`${id} 0 R`).join(' ')}] >>`));

  jpegPages.forEach((page, i)=>{
    const pageId = 3 + i*3;
    const imageId = pageId + 1;
    const contentId = pageId + 2;
    writeObject(pageId, ()=>pushText(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pageWidthPt} ${pageHeightPt}] /Resources << /XObject << /Im${i} ${imageId} 0 R >> >> /Contents ${contentId} 0 R >>`));
    const imageBytes = base64Bytes(page.dataUrl);
    writeObject(imageId, ()=>{
      pushText(`<< /Type /XObject /Subtype /Image /Width ${page.width} /Height ${page.height} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${imageBytes.length} >>\nstream\n`);
      pushBytes(imageBytes);
      pushText('\nendstream');
    });
    const stream = `q\n${pageWidthPt} 0 0 ${pageHeightPt} 0 0 cm\n/Im${i} Do\nQ`;
    writeObject(contentId, ()=>pushText(`<< /Length ${encoder.encode(stream).length} >>\nstream\n${stream}\nendstream`));
  });

  const xrefOffset = length;
  pushText(`xref\n0 ${objectCount+1}\n`);
  pushText('0000000000 65535 f \n');
  for(let i=1;i<=objectCount;i++) pushText(`${String(offsets[i]).padStart(10,'0')} 00000 n \n`);
  pushText(`trailer\n<< /Size ${objectCount+1} /Root 1 0 R >>\nstartxref\n${xrefOffset}\n%%EOF`);
  return new Blob(chunks, {type:'application/pdf'});
}

async function exportVehicleHistory(){
  const v = DATA.vehicles.find(x=>x.id === currentVehicleId);
  if(!v) return;
  const ops = [...(v.ops||[])].sort((a,b)=>{
    const dateCmp = String(a.date||'').localeCompare(String(b.date||''));
    return dateCmp || String(a.id||'').localeCompare(String(b.id||''));
  });
  if(ops.length === 0){
    alert("Aucune opération à inclure dans l'historique de ce véhicule.");
    return;
  }

  let logo = null;
  try{ logo = await loadHistoryImage(HISTORY_REPORT_LOGO); }catch(e){}

  const W = 1240, H = 1754;
  const margin = 82;
  const contentW = W - margin*2;
  const pages = [];
  const firstDate = ops[0]?.date ? formatHistoryDate(ops[0].date) : '—';
  const lastDate = ops[ops.length-1]?.date ? formatHistoryDate(ops[ops.length-1].date) : '—';
  const generatedAt = new Date().toLocaleDateString('fr-FR');

  let canvas, ctx, y, pageNo = 0;
  const newPage = ()=>{
    canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    ctx = canvas.getContext('2d');
    ctx.fillStyle = '#fff'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#111'; ctx.textBaseline = 'top';
    y = margin;
    pageNo++;
  };
  const finishPage = ()=>{
    ctx.fillStyle = '#777'; ctx.font = '22px Arial'; ctx.textAlign = 'right';
    ctx.fillText(`Page ${pageNo}`, W-margin, H-48);
    ctx.textAlign = 'left';
    pages.push({dataUrl:canvas.toDataURL('image/jpeg',0.94), width:W, height:H});
  };
  const drawTableHeader = ()=>{
    ctx.fillStyle = '#111'; ctx.fillRect(margin,y,contentW,4); y += 14;
    ctx.font = 'bold 22px Arial'; ctx.fillStyle = '#111';
    ctx.fillText('DATE', margin, y);
    ctx.fillText('KILOMÉTRAGE', margin+230, y);
    ctx.fillText('OPÉRATION ET DÉTAILS', margin+465, y);
    y += 38;
    ctx.fillRect(margin,y,contentW,3); y += 12;
  };

  newPage();
  if(logo){
    const maxW=235, maxH=105;
    const ratio=Math.min(maxW/logo.width,maxH/logo.height);
    ctx.drawImage(logo,W-margin-logo.width*ratio,margin,logo.width*ratio,logo.height*ratio);
  }
  ctx.font = 'bold 20px Arial'; ctx.fillStyle='#555'; ctx.fillText("WHEELER BROTHERS · CARNET D'ATELIER",margin,y); y+=38;
  ctx.font = 'bold 48px Arial'; ctx.fillStyle='#111'; ctx.fillText('Historique complet du véhicule',margin,y); y+=68;
  ctx.font = 'bold 31px Arial'; ctx.fillText(v.modele||'Véhicule',margin,y); y+=48;
  ctx.font = '23px Arial';
  const metaLeft = [
    `Motorisation : ${v.motorisation||'Non renseignée'}`,
    `Propriétaire : ${v.owner||'Non renseigné'}`
  ];
  const metaRight = [
    `Immatriculation : ${v.plate||'Non renseignée'}`,
    `Document généré le : ${generatedAt}`
  ];
  metaLeft.forEach((t,i)=>ctx.fillText(t,margin,y+i*34));
  metaRight.forEach((t,i)=>ctx.fillText(t,margin+555,y+i*34));
  y += 86;
  ctx.fillRect(margin,y,contentW,5); y += 35;
  ctx.fillStyle='#f4f5f7'; ctx.fillRect(margin,y,contentW,72);
  ctx.strokeStyle='#d9dde4'; ctx.lineWidth=2; ctx.strokeRect(margin,y,contentW,72);
  ctx.fillStyle='#111'; ctx.font='23px Arial';
  ctx.fillText(`${ops.length} opération${ops.length>1?'s':''} enregistrée${ops.length>1?'s':''}, du ${firstDate} au ${lastDate}.`,margin+20,y+23);
  y += 108;
  drawTableHeader();

  for(const o of ops){
    const title = o.operation || 'Intervention';
    const notes = cleanHistoryNotes(o.notes);
    ctx.font='bold 24px Arial';
    const titleLines = historyTextLines(ctx,title,contentW-485);
    ctx.font='21px Arial';
    const noteLines = notes ? historyTextLines(ctx,notes,contentW-485) : [];
    const rowH = Math.max(78, 18 + titleLines.length*31 + (noteLines.length ? 8 + noteLines.length*28 : 0) + 18);
    if(y + rowH > H - 90){
      finishPage(); newPage();
      ctx.font='bold 27px Arial'; ctx.fillText(`Historique — ${v.modele||'Véhicule'}`,margin,y); y+=52;
      drawTableHeader();
    }
    ctx.fillStyle='#111'; ctx.font='bold 22px Arial';
    ctx.fillText(formatHistoryDate(o.date),margin,y+17);
    ctx.font='22px Arial'; ctx.fillText(o.km ? `${o.km} km` : '—',margin+230,y+17);
    ctx.font='bold 24px Arial';
    let textY = drawHistoryLines(ctx,titleLines,margin+465,y+14,31);
    if(noteLines.length){
      ctx.fillStyle='#444'; ctx.font='21px Arial';
      drawHistoryLines(ctx,noteLines,margin+465,textY+7,28);
    }
    ctx.strokeStyle='#d9dde4'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(margin,y+rowH); ctx.lineTo(W-margin,y+rowH); ctx.stroke();
    y += rowH;
  }
  finishPage();

  const pdfBlob = buildImagePdf(pages);
  const filename = `Historique_${safeFilePart(v.modele)}_${safeFilePart(v.plate||'sans_immatriculation')}.pdf`;
  const url = URL.createObjectURL(pdfBlob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.rel = 'noopener';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 60000);
}

function operationYear(operation){
  const value = String((operation && operation.date) || '').trim();
  const match = value.match(/^(\d{4})/);
  return match ? Number(match[1]) : null;
}

function qualifyingAnnualOperations(year){
  const operations = [];
  DATA.vehicles.forEach(vehicle=>{
    (vehicle.ops || []).forEach(operation=>{
      const temps = Number(operation.temps || 0);
      const remuneration = Number(operation.remuneration || 0);
      if(operationYear(operation) === Number(year) && temps > 0 && remuneration > 0){
        operations.push({...operation, temps, remuneration});
      }
    });
  });
  return operations;
}

function availableStatisticsYears(){
  const years = new Set();
  DATA.vehicles.forEach(vehicle=>{
    (vehicle.ops || []).forEach(operation=>{
      const year = operationYear(operation);
      if(year) years.add(year);
    });
  });
  const currentYear = new Date().getFullYear();
  years.add(currentYear);
  return [...years].sort((a,b)=>b-a);
}

function formatDurationHours(value){
  const totalMinutes = Math.round(Number(value || 0) * 60);
  const hours = Math.floor(totalMinutes / 60);
  const minutes = totalMinutes % 60;
  return minutes ? `${hours} h ${String(minutes).padStart(2,'0')}` : `${hours} h`;
}

  const averagePay = count ? totalPay / count : 0;

async function onAddOp(){
  const v = DATA.vehicles.find(x=>x.id === currentVehicleId);
  if(!v) return;
  const statusEl = document.getElementById('opStatus');

  const operation = document.getElementById('opOperation').value.trim();
  const temps = parseFloat(document.getElementById('opTemps').value);
  const remuneration = parseFloat(document.getElementById('opRemu').value);
  const date = document.getElementById('opDate').value;
  const km = document.getElementById('opKm').value.trim();
  const notes = document.getElementById('opNotes').value.trim();

  if(!operation){
    statusEl.className='status-msg status-err';
    statusEl.textContent = "Indique le type d'opération réalisée.";
    return;
  }
  if(isNaN(temps) || temps <= 0){
    statusEl.className='status-msg status-err';
    statusEl.textContent = 'Indique un temps passé valide (en heures).';
    return;
  }
  if(isNaN(remuneration) || remuneration < 0){
    statusEl.className='status-msg status-err';
    statusEl.textContent = 'Indique une rémunération valide.';
    return;
  }

  if(editingOpId){
    const op = v.ops.find(o=>o.id===editingOpId);
    if(op) Object.assign(op, { date, operation, km, temps, remuneration, notes });
    editingOpId = null;
  } else {
    v.ops.push({ id: uid(), date, operation, km, temps, remuneration, notes });
  }
  v.updatedAt = Date.now();

  statusEl.className='status-msg';
  statusEl.textContent = 'Enregistrement…';
  const ok = await saveData();
  if(ok){
    renderSidebar();
    renderMain();
  } else {
    statusEl.className='status-msg status-err';
    statusEl.textContent = "Échec de l'enregistrement, réessaie.";
  }
}

async function onDeleteOp(opId){
  const v = DATA.vehicles.find(x=>x.id === currentVehicleId);
  if(!v) return;
  if(!confirm('Supprimer cette intervention ?')) return;
  v.ops = v.ops.filter(o=>o.id !== opId);
  v.updatedAt = Date.now();
  if(editingOpId === opId) editingOpId = null;
  await saveData();
  renderSidebar();
  renderMain();
}

async function onDeleteVehicle(){
  const v = DATA.vehicles.find(x=>x.id === currentVehicleId);
  if(!v) return;
  if(!confirm(`Supprimer toute la fiche "${v.modele} — ${v.motorisation}" et ses ${v.ops.length} intervention(s) ?`)) return;
  DATA.vehicles = DATA.vehicles.filter(x=>x.id !== v.id);
  currentVehicleId = null;
  await saveData();
  renderSidebar();
  renderMain();
}

function renderNewVehicleForm(){
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="card">
      <h2 style="font-size:19px; margin:0; padding:18px 18px 0;">Nouvelle fiche véhicule</h2>
      <div class="body">
        <div class="grid2">
          <div class="field">
            <label for="newModele">Modèle</label>
            <input type="text" id="newModele" placeholder="ex. Peugeot 3008 II">
          </div>
          <div class="field">
            <label for="newMoto">Motorisation</label>
            <input type="text" id="newMoto" placeholder="ex. 1.6 THP 165 EP6FDTX">
          </div>
          <div class="field">
            <label for="newPlate">Immatriculation</label>
            <input type="text" id="newPlate" placeholder="ex. GC-705-LH">
          </div>
          <div class="field">
            <label for="newOwner">Propriétaire</label>
            <input type="text" id="newOwner" placeholder="ex. Jean Dupont">
          </div>
        </div>
        <div class="form-actions">
          <button class="btn" id="btnCreateVehicle" type="button">Créer la fiche</button>
          <button class="btn ghost" id="btnCancelNew" type="button">Annuler</button>
        </div>
        <div class="status-msg" id="newStatus"></div>
      </div>
    </div>
  `;
  document.getElementById('btnCreateVehicle').addEventListener('click', onCreateVehicle);
  document.getElementById('btnCancelNew').addEventListener('click', renderMain);
}

async function onCreateVehicle(){
  const modele = document.getElementById('newModele').value.trim();
  const motorisation = document.getElementById('newMoto').value.trim();
  const plate = document.getElementById('newPlate').value.trim().toUpperCase();
  const owner = document.getElementById('newOwner').value.trim();
  const statusEl = document.getElementById('newStatus');
  if(!modele || !motorisation){
    statusEl.className='status-msg status-err';
    statusEl.textContent = 'Renseigne le modèle et la motorisation.';
    return;
  }
  const v = { id: uid(), modele, motorisation, plate, owner, ops: [], updatedAt: Date.now() };
  DATA.vehicles.push(v);
  statusEl.textContent = 'Enregistrement…';
  const ok = await saveData();
  if(ok){
    currentVehicleId = v.id;
    renderSidebar();
    renderMain();
  } else {
    statusEl.className='status-msg status-err';
    statusEl.textContent = "Échec de l'enregistrement, réessaie.";
  }
}

document.getElementById('btnNewVehicle').addEventListener('click', renderNewVehicleForm);
document.getElementById('btnAnnualStats').addEventListener('click', ()=>{ renderAnnualStatistics(); if(isMobileAtelier()) setMobileViewAtelier('detail'); });
document.getElementById('search').addEventListener('input', (e)=>{
  searchTerm = e.target.value;
  renderSidebar();
});
document.getElementById('btnExport').addEventListener('click', exportData);
document.getElementById('importFile').addEventListener('change', (e)=>{
  const f = e.target.files[0];
  if(f) importData(f);
  e.target.value = '';
});

/* ---------- adaptation mobile : bascule Liste / Détail ---------- */
function isMobileAtelier(){ return window.matchMedia('(max-width:768px)').matches; }
function setMobileViewAtelier(view){
  document.body.setAttribute('data-mview', view);
  const bl = document.getElementById('mviewList');
  const bd = document.getElementById('mviewDetail');
  if(bl && bd){
    bl.classList.toggle('active', view==='list');
    bd.classList.toggle('active', view==='detail');
  }
}
document.getElementById('mviewList').addEventListener('click', ()=>setMobileViewAtelier('list'));
document.getElementById('mviewDetail').addEventListener('click', ()=>setMobileViewAtelier('detail'));
// quand on crée une nouvelle fiche, on bascule vers le détail pour la remplir
document.getElementById('btnNewVehicle').addEventListener('click', ()=>{ if(isMobileAtelier()) setMobileViewAtelier('detail'); });
// vue par défaut sur mobile : la liste
setMobileViewAtelier('list');

loadData();
</script>
