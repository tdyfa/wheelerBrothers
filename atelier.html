<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Carnet d'atelier</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Carnet d'atelier">
<meta name="theme-color" content="#0f1216">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --ink:#111418; --ink-soft:#3b4250; --muted:#6b7280; --line:#e3e7ee;
    --accent:#111418; --bg:#eef1f5; --card:#ffffff; --field:#f6f8fb;
    --ok:#1f7a3d; --warn:#b3261e;
    --shadow:0 1px 2px rgba(16,24,40,.06),0 6px 22px rgba(16,24,40,.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Helvetica Neue",Arial,"Segoe UI",sans-serif;
    color:var(--ink); background:var(--bg); -webkit-font-smoothing:antialiased;
  }

  .app-bar{
    position:sticky; top:0; z-index:50;
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    padding:10px 20px; background:#0f1216; color:#fff;
    box-shadow:0 2px 10px rgba(0,0,0,.18);
  }
  .app-bar img{height:28px; width:auto; display:block;}
  .app-bar h1{font-size:15px; margin:0; font-weight:700; letter-spacing:.3px}
  .app-bar .sub{font-size:12px; color:#9aa3b2; margin-right:auto}

  .wrap{display:flex; gap:24px; align-items:flex-start; padding:24px; max-width:1400px; margin:0 auto}
  @media (max-width:900px){ .wrap{flex-direction:column} }

  /* ---- Sidebar ---- */
  .sidebar{flex:0 0 300px; max-width:300px; width:100%}
  @media (min-width:901px){
    .sidebar{position:sticky; top:58px; align-self:flex-start; max-height:calc(100vh - 74px); overflow-y:auto; padding-right:4px;}
  }
  @media (max-width:900px){ .sidebar{flex:1 1 auto; max-width:none} }

  .card{background:var(--card); border:1px solid var(--line); border-radius:14px; box-shadow:var(--shadow); margin-bottom:18px; overflow:hidden}
  .card > h2{font-size:13px; text-transform:uppercase; letter-spacing:.8px; color:var(--muted); margin:0; padding:14px 16px; border-bottom:1px solid var(--line); background:#fafbfd}
  .card .body{padding:16px}

  label{display:block; font-size:12px; font-weight:600; color:var(--ink-soft); margin:0 0 5px}
  input[type=text], input[type=date], input[type=number], textarea, select{
    width:100%; border:1px solid var(--line); background:var(--field);
    border-radius:9px; padding:9px 11px; font-size:14px; color:var(--ink); font-family:inherit;
  }
  input:focus, textarea:focus, select:focus{outline:none; border-color:#9aa3b2; background:#fff}
  .field{margin-bottom:12px}
  .field:last-child{margin-bottom:0}

  #search{margin-bottom:2px}

  .vehicle-list{list-style:none; margin:0; padding:8px 8px 4px; max-height:520px; overflow-y:auto;}
  .vehicle-item{
    display:flex; justify-content:space-between; align-items:center; gap:8px;
    padding:10px 8px; border-radius:9px; cursor:pointer;
  }
  .vehicle-item:hover{background:var(--field);}
  .vehicle-item.active{background:var(--ink); }
  .vehicle-item.active .vname, .vehicle-item.active .vmeta{color:#fff;}
  .vname{font-weight:700; font-size:14px; display:block;}
  .vmeta{font-size:11.5px; color:var(--muted); display:block; margin-top:1px;}
  .vcount{
    font-size:11px; font-weight:700; background:var(--field); color:var(--ink-soft);
    padding:2px 8px; border-radius:20px; flex-shrink:0; border:1px solid var(--line);
  }
  .vehicle-item.active .vcount{background:rgba(255,255,255,.15); color:#fff; border-color:transparent;}
  .empty-note{font-size:12.5px; color:var(--muted); padding:12px 8px;}

  .btn{
    border:0; border-radius:9px; padding:10px 16px; font-size:13.5px; font-weight:700;
    cursor:pointer; background:var(--ink); color:#fff; transition:.15s; font-family:inherit;
  }
  .btn:hover{background:#272d36}
  .btn.ghost{background:transparent; border:1px solid var(--line); color:var(--ink-soft); font-weight:600;}
  .btn.ghost:hover{border-color:#9aa3b2; background:var(--field);}
  .btn.danger-outline{background:transparent; border:1px solid #e6b3ae; color:var(--warn); font-weight:600;}
  .btn.danger-outline:hover{background:#fbeceb;}
  .btn.block{width:100%}

  /* ---- Main ---- */
  .main{flex:1 1 auto; min-width:0}
  .main-empty{
    display:flex; align-items:center; justify-content:center; min-height:360px;
    color:var(--muted); text-align:center; padding:20px; font-size:14px;
  }

  .vhead{display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:16px; padding:18px 18px 6px;}
  .vhead h2{font-size:22px; margin:0 0 3px; letter-spacing:-.2px;}
  .vhead .moto{font-size:13px; color:var(--muted);}

  .rate-flag{font-size:11.5px; margin-top:8px; font-weight:600;}
  .rate-ok{color:var(--ok);}
  .rate-warn{color:var(--warn);}

  .stats{display:flex; gap:10px; flex-wrap:wrap;}
  .stat{border:1px solid var(--line); border-radius:10px; padding:8px 14px; text-align:center; min-width:88px; background:#fafbfd;}
  .stat .num{font-size:19px; font-weight:800; line-height:1.1;}
  .stat .lbl{font-size:10px; text-transform:uppercase; color:var(--muted); letter-spacing:.4px; margin-top:2px;}

  table.ops{width:100%; border-collapse:collapse; font-size:13.5px;}
  table.ops th{
    text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.5px;
    color:var(--muted); border-bottom:1px solid var(--line); padding:8px 18px; background:#fafbfd;
  }
  table.ops td{padding:11px 18px; border-bottom:1px solid var(--line); vertical-align:top;}
  table.ops tr:hover td{background:#fafbfd;}
  .op-name{font-weight:700;}
  .op-notes{font-size:12px; color:var(--muted); margin-top:2px;}
  .num-cell{white-space:nowrap; font-variant-numeric:tabular-nums;}
  .del-btn{background:none; border:none; color:var(--muted); cursor:pointer; font-size:11.5px; text-decoration:underline; font-family:inherit;}
  .del-btn:hover{color:var(--warn);}

  .form-box{margin:18px; background:var(--field); border:1px solid var(--line); border-radius:12px; padding:16px;}
  .form-box h3{font-size:14px; margin:0 0 12px; color:var(--ink-soft);}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .grid3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px;}
  @media (max-width:560px){.grid2,.grid3{grid-template-columns:1fr;}}
  .form-actions{display:flex; gap:10px; margin-top:4px; flex-wrap:wrap;}
  .status-msg{font-size:12px; margin-top:8px; min-height:14px; font-weight:600;}
  .status-ok{color:var(--ok);}
  .status-err{color:var(--warn);}

  .footer-actions{padding:0 18px 18px;}

  .loading{color:var(--muted); padding:40px; text-align:center; font-size:13px;}
  /* ============ MOBILE (≤ 768px) ============ */
  .mobile-toggle{display:none}
  @media (max-width:768px){
    /* barre du haut : respecte la zone sûre iOS, défile normalement */
    .app-bar{
      position:static;
      gap:8px; padding:calc(10px + env(safe-area-inset-top)) 12px 10px;
    }
    .app-bar img{height:24px}
    .app-bar h1{font-size:14px; width:100%; margin-bottom:2px}
    .app-bar .sub{font-size:11px; margin-right:auto}
    .app-bar .btn{padding:8px 10px; font-size:12px}
    #syncWarn{width:100%; order:99}

    /* bascule Liste / Détail, collée en haut sous la Dynamic Island */
    .mobile-toggle{
      display:flex; position:sticky; top:0; z-index:60;
      background:#0f1216; gap:8px;
      padding:calc(8px + env(safe-area-inset-top)) 12px 10px;
    }
    .mobile-toggle button{
      flex:1; border:0; border-radius:9px; padding:11px; font-size:14px; font-weight:700;
      cursor:pointer; background:#2b3340; color:#fff;
    }
    .mobile-toggle button.active{background:#fff; color:#0f1216}

    .wrap{flex-direction:column; padding:12px; gap:0}
    .sidebar, .main{max-width:none; width:100%; flex:1 1 auto}
    .sidebar{position:static; max-height:none; overflow:visible; padding-right:0}

    /* affiche liste OU détail selon la vue */
    body[data-mview="detail"] .sidebar{display:none}
    body[data-mview="list"] .main{display:none}

    /* stats : 2 colonnes pour tenir sur l'écran */
    .vhead{flex-direction:column; padding:16px 16px 4px}
    .stats{width:100%; display:grid; grid-template-columns:1fr 1fr; gap:8px}
    .stat{min-width:0}

    /* tableau des interventions -> cartes empilées */
    table.ops, table.ops thead, table.ops tbody, table.ops tr, table.ops td{display:block; width:100%}
    table.ops thead{display:none}
    table.ops{font-size:14px}
    table.ops tr{
      border:1px solid var(--line); border-radius:10px; margin-bottom:10px;
      padding:6px 4px; background:#fff;
    }
    table.ops td{
      border:none; padding:6px 12px; display:flex; justify-content:space-between; gap:12px; text-align:right;
    }
    table.ops td::before{
      content:attr(data-label); font-weight:600; color:var(--muted); font-size:12px;
      text-align:left; flex:0 0 auto;
    }
    /* la cellule Opération : label au-dessus, texte aligné à gauche */
    table.ops td[data-label="Opération"]{flex-direction:column; text-align:left; gap:2px}
    table.ops td[data-label="Opération"]::before{margin-bottom:2px}
    .op-name{font-weight:700}
    /* boutons d'action pleine largeur */
    table.ops td.ops-actions{justify-content:flex-end; padding-top:8px; border-top:1px solid var(--line); margin-top:4px}
    table.ops td.ops-actions::before{content:none}
    /* on retire le conteneur scroll horizontal devenu inutile */
    .ops-scroll{overflow-x:visible !important; border:none !important; border-radius:0 !important; margin-top:0 !important}

    .grid2, .grid3{grid-template-columns:1fr}
  }
</style>
</head>

    const el = document.getElementById(id);
    if(el){
      captured[id] = el.value;
      if(document.activeElement === el) anyFocused = true;
    }
  });
  captured._hadFocus = anyFocused;
  return captured;
}

function restoreFormState(captured){
  if(!captured) return;
  Object.keys(captured).forEach(id=>{
    if(id === '_hadFocus') return;
    const el = document.getElementById(id);
    if(el) el.value = captured[id];
  });
}

function renderMainPreservingForm(){
  const captured = captureFormState();
  renderMain();
  if(captured._hadFocus) restoreFormState(captured);
}

function flagSyncError(customMsg){
  const el = document.getElementById('syncWarn');
  if(el){
    el.textContent = customMsg || "⚠️ Synchronisation impossible (code d'atelier ou réseau) → tes modifications restent sur ce téléphone uniquement";
    el.style.display = 'inline';
  }
}
function clearSyncError(){
  const el = document.getElementById('syncWarn');
  if(el) el.style.display = 'none';
}

async function loadData(){
  const docRef = sharedDocRef('atelier');
  docRef.onSnapshot((snap)=>{
    clearSyncError();
    if(snap.exists){
      const remote = snap.data();
      try{
        DATA = remote.payload ? JSON.parse(remote.payload) : { vehicles: [] };
      }catch(e){ DATA = { vehicles: [] }; }
      if(!DATA.vehicles) DATA.vehicles = [];
    } else {
      DATA = { vehicles: [] };
    }
    const loadingMsg = document.getElementById('loadingMsg');
    if(loadingMsg) loadingMsg.remove();
    renderSidebar();
    renderMainPreservingForm();
  }, (err)=>{
    console.error('Synchronisation impossible', err);
    const loadingMsg = document.getElementById('loadingMsg');
    if(loadingMsg) loadingMsg.remove();
    flagSyncError();
  });
}

async function saveData(){
  try{
    const docRef = sharedDocRef('atelier');
    await docRef.set({ payload: JSON.stringify(DATA), updatedAt: Date.now() });
    clearSyncError();
    return true;
  }catch(e){
    console.error('Erreur de synchronisation', e);
    flagSyncError();
    return false;
  }
}

function exportData(){
  const blob = new Blob([JSON.stringify(DATA, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const stamp = new Date().toISOString().slice(0,10);
  a.download = `carnet-atelier_${stamp}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function importData(file){
  const reader = new FileReader();
  reader.onload = async () => {
    try{
      const parsed = JSON.parse(reader.result);
      if(!parsed || !Array.isArray(parsed.vehicles)) throw new Error('format invalide');
      const replace = confirm(
        `Ce fichier contient ${parsed.vehicles.length} fiche(s) véhicule.\n\n` +
        `OK = remplacer entièrement tes données actuelles par ce fichier.\n` +
        `Annuler = fusionner (les fiches du fichier s'ajoutent à celles déjà présentes).`
      );
      if(replace){
        DATA = parsed;
      } else {
        const existingIds = new Set(DATA.vehicles.map(v=>v.id));
        parsed.vehicles.forEach(v=>{
          if(!existingIds.has(v.id)) DATA.vehicles.push(v);
        });
      }
      const ok = await saveData();
      if(!ok){
        alert("Échec de l'enregistrement dans l'espace partagé. Vérifie ton code d'atelier ou ta connexion, puis réessaie l'import.");
        return;
      }
      currentVehicleId = null;
      renderSidebar();
      renderMain();
      alert('Import terminé.');
    }catch(e){
      alert("Ce fichier n'est pas un export valide du carnet d'atelier.");
    }
  };
  reader.readAsText(file);
}

function fmtEuro(n){ return n.toLocaleString('fr-FR',{minimumFractionDigits:0, maximumFractionDigits:2}) + ' €'; }
function fmtH(n){ return n.toLocaleString('fr-FR',{minimumFractionDigits:0, maximumFractionDigits:2}) + ' h'; }

function vehicleStats(v){
  const totalTemps = v.ops.reduce((s,o)=>s+Number(o.temps||0),0);
  const totalRemu = v.ops.reduce((s,o)=>s+Number(o.remuneration||0),0);
  const taux = totalTemps > 0 ? totalRemu/totalTemps : null;
  return { totalTemps, totalRemu, taux, count: v.ops.length };
}

function globalAvgRate(){
  let t=0, r=0;
  DATA.vehicles.forEach(v=>v.ops.forEach(o=>{t+=Number(o.temps||0); r+=Number(o.remuneration||0);}));
  return t>0 ? r/t : null;
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s == null ? '' : String(s);
  return d.innerHTML;
}

function renderSidebar(){
  const list = document.getElementById('vehicleList');
  list.innerHTML = '';
  const term = searchTerm.trim().toLowerCase();
  const filtered = DATA.vehicles
    .filter(v => !term || (v.modele+' '+v.motorisation+' '+(v.plate||'')).toLowerCase().includes(term))
    .sort((a,b)=> (b.updatedAt||0) - (a.updatedAt||0));

  if(filtered.length === 0){
    const li = document.createElement('div');
    li.className = 'empty-note';
    li.textContent = DATA.vehicles.length === 0
      ? "Aucune fiche pour l'instant. Crée la première."
      : 'Aucun résultat.';
    list.appendChild(li);
    return;
  }

  filtered.forEach(v=>{
    const li = document.createElement('li');
    li.className = 'vehicle-item' + (v.id === currentVehicleId ? ' active' : '');
    li.innerHTML = `
      <div>
        <span class="vname">${escapeHtml(v.modele)}</span>
        <span class="vmeta">${escapeHtml(v.motorisation)}${v.plate ? ` · ${escapeHtml(v.plate)}` : ''}</span>
      </div>
      <span class="vcount">${v.ops.length}</span>
    `;
    li.addEventListener('click', ()=>{ currentVehicleId = v.id; editingVehicleMode = false; editingOpId = null; renderSidebar(); renderMain(); if(isMobileAtelier()) setMobileViewAtelier('detail'); });
    list.appendChild(li);
  });
}

function renderMain(){
  const main = document.getElementById('main');
  const v = DATA.vehicles.find(x=>x.id === currentVehicleId);

  if(!v){
    main.innerHTML = `<div class="card main-empty">
      Sélectionne une fiche véhicule à gauche, ou crée-en une nouvelle pour commencer à consigner tes interventions.
    </div>`;
    return;
  }

  const stats = vehicleStats(v);
  const avgAll = globalAvgRate();
  let rateFlag = '';
  if(stats.taux !== null && avgAll !== null && v.ops.length > 0){
    const diffPct = ((stats.taux - avgAll) / avgAll) * 100;
    if(Math.abs(diffPct) < 15){
      rateFlag = `<div class="rate-flag rate-ok">≈ cohérent avec ta moyenne générale (${fmtEuro(avgAll)}/h)</div>`;
    } else {
      const sens = diffPct > 0 ? 'au-dessus' : 'en dessous';
      rateFlag = `<div class="rate-flag rate-warn">${Math.abs(diffPct).toFixed(0)}% ${sens} de ta moyenne générale (${fmtEuro(avgAll)}/h)</div>`;
    }
  }

  const rows = [...v.ops].sort((a,b)=> (b.date||'').localeCompare(a.date||'')).map(o=>{
    const tarif = o.temps > 0 ? (o.remuneration/o.temps) : null;
    return `<tr>
      <td class="num-cell" data-label="Date">${escapeHtml(o.date||'—')}</td>
      <td data-label="Opération">
        <div class="op-name">${escapeHtml(o.operation)}</div>
        ${o.notes ? `<div class="op-notes">${escapeHtml(o.notes)}</div>` : ''}
      </td>
      <td class="num-cell" data-label="Km">${o.km ? escapeHtml(o.km)+' km' : '—'}</td>
      <td class="num-cell" data-label="Temps">${fmtH(Number(o.temps||0))}</td>
      <td class="num-cell" data-label="Rémunération">${fmtEuro(Number(o.remuneration||0))}</td>
      <td class="num-cell" data-label="Taux">${tarif !== null ? fmtEuro(tarif)+'/h' : '—'}</td>
      <td class="ops-actions" style="white-space:nowrap;">
        <button class="del-btn" data-op-edit="${o.id}">modifier</button> ·
        <button class="del-btn" data-op="${o.id}">supprimer</button>
      </td>
    </tr>`;
  }).join('');

  const editOp = editingOpId ? v.ops.find(o=>o.id===editingOpId) : null;
  const editOpValues = editOp || {date:new Date().toISOString().slice(0,10), km:'', temps:'', operation:'', remuneration:'', notes:''};

  main.innerHTML = `
    <div class="card">
      <div class="vhead">
        <div style="flex:1; min-width:220px;">
          ${editingVehicleMode ? `
            <div class="grid2" style="max-width:480px;">
              <div class="field">
                <label for="editModele">Modèle</label>
                <input type="text" id="editModele" value="${escapeHtml(v.modele)}">
              </div>
              <div class="field">
                <label for="editMoto">Motorisation</label>
                <input type="text" id="editMoto" value="${escapeHtml(v.motorisation)}">
              </div>
              <div class="field">
                <label for="editPlate">Immatriculation</label>
                <input type="text" id="editPlate" placeholder="ex. GC-705-LH" value="${escapeHtml(v.plate||'')}">
              </div>
            </div>
            <div class="form-actions" style="margin-top:8px;">
              <button class="btn" id="btnSaveVehicleEdit" type="button">Enregistrer</button>
              <button class="btn ghost" id="btnCancelVehicleEdit" type="button">Annuler</button>
            </div>
          ` : `
            <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
              <h2 style="margin:0;">${escapeHtml(v.modele)}</h2>
              <button class="btn ghost" id="btnEditVehicle" type="button" style="padding:3px 10px; font-size:12px;">Modifier</button>
            </div>
            <div class="moto">${escapeHtml(v.motorisation)}${v.plate ? ` · ${escapeHtml(v.plate)}` : ''}</div>
            ${rateFlag}
          `}
        </div>
        <div class="stats">
          <div class="stat"><div class="num">${stats.count}</div><div class="lbl">Interv.</div></div>
          <div class="stat"><div class="num">${fmtH(stats.totalTemps)}</div><div class="lbl">Temps total</div></div>
          <div class="stat"><div class="num">${fmtEuro(stats.totalRemu)}</div><div class="lbl">Total perçu</div></div>
          <div class="stat"><div class="num">${stats.taux!==null ? fmtEuro(stats.taux) : '—'}</div><div class="lbl">Taux moyen /h</div></div>
        </div>
      </div>

      <div style="padding:0 18px 4px;">
      ${v.ops.length === 0
        ? '<div class="empty-note">Pas encore d\'intervention consignée pour ce véhicule.</div>'
        : `<div class="ops-scroll" style="overflow-x:auto; border:1px solid var(--line); border-radius:12px; margin-top:10px;">
            <table class="ops">
              <thead><tr>
                <th>Date</th><th>Opération</th><th>Km</th><th>Temps</th><th>Rémunération</th><th>Taux</th><th></th>
              </tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>`
      }
      </div>

      <div class="form-box">
        <h3>${editingOpId ? "Modifier l'intervention" : "Ajouter une intervention"}</h3>
        <div class="grid3">
          <div class="field">
            <label for="opDate">Date</label>
            <input type="date" id="opDate" value="${editOpValues.date}">
          </div>
          <div class="field">
            <label for="opKm">Kilométrage</label>
            <input type="number" id="opKm" placeholder="ex. 98000" value="${editOpValues.km ?? ''}">
          </div>
          <div class="field">
            <label for="opTemps">Temps passé (h)</label>
            <input type="number" step="0.25" id="opTemps" placeholder="ex. 2.5" value="${editOpValues.temps ?? ''}">
          </div>
        </div>
        <div class="field">
          <label for="opOperation">Opération</label>
          <input type="text" id="opOperation" placeholder="ex. Distribution + pompe à eau, révision, plaquettes avant..." value="${escapeHtml(editOpValues.operation||'')}">
        </div>
        <div class="grid2">
          <div class="field">
            <label for="opRemu">Rémunération reçue (€)</label>
            <input type="number" step="1" id="opRemu" placeholder="ex. 150" value="${editOpValues.remuneration ?? ''}">
          </div>
          <div class="field">
            <label for="opNotes">Notes (pièces utilisées, difficultés...)</label>
            <input type="text" id="opNotes" placeholder="facultatif" value="${escapeHtml(editOpValues.notes||'')}">
          </div>
        </div>
        <div class="form-actions">
          <button class="btn" id="btnAddOp" type="button">${editingOpId ? 'Mettre à jour' : "Enregistrer l'intervention"}</button>
          ${editingOpId ? '<button class="btn ghost" id="btnCancelOpEdit" type="button">Annuler la modification</button>' : ''}
        </div>
        <div class="status-msg" id="opStatus"></div>
      </div>

      <div class="footer-actions">
        <button class="btn danger-outline" id="btnDeleteVehicle" type="button">Supprimer cette fiche véhicule</button>
      </div>
    </div>
  `;

  document.getElementById('btnAddOp').addEventListener('click', onAddOp);
  document.getElementById('btnDeleteVehicle').addEventListener('click', onDeleteVehicle);
  if(editingVehicleMode){
    document.getElementById('btnSaveVehicleEdit').addEventListener('click', onSaveVehicleEdit);
    document.getElementById('btnCancelVehicleEdit').addEventListener('click', ()=>{ editingVehicleMode = false; renderMain(); });
  } else {
    document.getElementById('btnEditVehicle').addEventListener('click', ()=>{ editingVehicleMode = true; renderMain(); });
  }
  if(editingOpId){
    const cancelOpBtn = document.getElementById('btnCancelOpEdit');
    if(cancelOpBtn) cancelOpBtn.addEventListener('click', ()=>{ editingOpId = null; renderMain(); });
  }
  main.querySelectorAll('.del-btn[data-op]').forEach(b=>{
    b.addEventListener('click', ()=>onDeleteOp(b.dataset.op));
  });
  main.querySelectorAll('.del-btn[data-op-edit]').forEach(b=>{
    b.addEventListener('click', ()=>{ editingOpId = b.dataset.opEdit; renderMain(); });
  });
}

async function onSaveVehicleEdit(){
  const v = DATA.vehicles.find(x=>x.id === currentVehicleId);
  if(!v) return;
  const modele = document.getElementById('editModele').value.trim();
  const motorisation = document.getElementById('editMoto').value.trim();
  const plate = document.getElementById('editPlate').value.trim().toUpperCase();
  if(!modele || !motorisation){
    alert('Renseigne le modèle et la motorisation.');
    return;
  }
  v.modele = modele;
  v.motorisation = motorisation;
  v.plate = plate;
  v.updatedAt = Date.now();
  editingVehicleMode = false;
  const ok = await saveData();
  if(!ok) alert("Échec de l'enregistrement, réessaie.");
  renderSidebar();
  renderMain();
}

async function onAddOp(){
  const v = DATA.vehicles.find(x=>x.id === currentVehicleId);
  if(!v) return;
  const statusEl = document.getElementById('opStatus');

  const operation = document.getElementById('opOperation').value.trim();
  const temps = parseFloat(document.getElementById('opTemps').value);
  const remuneration = parseFloat(document.getElementById('opRemu').value);
  const date = document.getElementById('opDate').value;
  const km = document.getElementById('opKm').value.trim();
  const notes = document.getElementById('opNotes').value.trim();

  if(!operation){
    statusEl.className='status-msg status-err';
    statusEl.textContent = "Indique le type d'opération réalisée.";
    return;
  }
  if(isNaN(temps) || temps <= 0){
    statusEl.className='status-msg status-err';
    statusEl.textContent = 'Indique un temps passé valide (en heures).';
    return;
  }
  if(isNaN(remuneration) || remuneration < 0){
    statusEl.className='status-msg status-err';
    statusEl.textContent = 'Indique une rémunération valide.';
    return;
  }

  if(editingOpId){
    const op = v.ops.find(o=>o.id===editingOpId);
    if(op) Object.assign(op, { date, operation, km, temps, remuneration, notes });
    editingOpId = null;
  } else {
    v.ops.push({ id: uid(), date, operation, km, temps, remuneration, notes });
  }
  v.updatedAt = Date.now();

  statusEl.className='status-msg';
  statusEl.textContent = 'Enregistrement…';
  const ok = await saveData();
  if(ok){
    renderSidebar();
    renderMain();
  } else {
    statusEl.className='status-msg status-err';
    statusEl.textContent = "Échec de l'enregistrement, réessaie.";
  }
}

async function onDeleteOp(opId){
  const v = DATA.vehicles.find(x=>x.id === currentVehicleId);
  if(!v) return;
  if(!confirm('Supprimer cette intervention ?')) return;
  v.ops = v.ops.filter(o=>o.id !== opId);
  v.updatedAt = Date.now();
  if(editingOpId === opId) editingOpId = null;
  await saveData();
  renderSidebar();
  renderMain();
}

async function onDeleteVehicle(){
  const v = DATA.vehicles.find(x=>x.id === currentVehicleId);
  if(!v) return;
  if(!confirm(`Supprimer toute la fiche "${v.modele} — ${v.motorisation}" et ses ${v.ops.length} intervention(s) ?`)) return;
  DATA.vehicles = DATA.vehicles.filter(x=>x.id !== v.id);
  currentVehicleId = null;
  await saveData();
  renderSidebar();
  renderMain();
}

function renderNewVehicleForm(){
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="card">
      <h2 style="font-size:19px; margin:0; padding:18px 18px 0;">Nouvelle fiche véhicule</h2>
      <div class="body">
        <div class="grid2">
          <div class="field">
            <label for="newModele">Modèle</label>
            <input type="text" id="newModele" placeholder="ex. Peugeot 3008 II">
          </div>
          <div class="field">
            <label for="newMoto">Motorisation</label>
            <input type="text" id="newMoto" placeholder="ex. 1.6 THP 165 EP6FDTX">
          </div>
          <div class="field">
            <label for="newPlate">Immatriculation</label>
            <input type="text" id="newPlate" placeholder="ex. GC-705-LH">
          </div>
        </div>
        <div class="form-actions">
          <button class="btn" id="btnCreateVehicle" type="button">Créer la fiche</button>
          <button class="btn ghost" id="btnCancelNew" type="button">Annuler</button>
        </div>
        <div class="status-msg" id="newStatus"></div>
      </div>
    </div>
  `;
  document.getElementById('btnCreateVehicle').addEventListener('click', onCreateVehicle);
  document.getElementById('btnCancelNew').addEventListener('click', renderMain);
}

async function onCreateVehicle(){
  const modele = document.getElementById('newModele').value.trim();
  const motorisation = document.getElementById('newMoto').value.trim();
  const plate = document.getElementById('newPlate').value.trim().toUpperCase();
  const statusEl = document.getElementById('newStatus');
  if(!modele || !motorisation){
    statusEl.className='status-msg status-err';
    statusEl.textContent = 'Renseigne le modèle et la motorisation.';
    return;
  }
  const v = { id: uid(), modele, motorisation, plate, ops: [], updatedAt: Date.now() };
  DATA.vehicles.push(v);
  statusEl.textContent = 'Enregistrement…';
  const ok = await saveData();
  if(ok){
    currentVehicleId = v.id;
    renderSidebar();
    renderMain();
  } else {
    statusEl.className='status-msg status-err';
    statusEl.textContent = "Échec de l'enregistrement, réessaie.";
  }
}

document.getElementById('btnNewVehicle').addEventListener('click', renderNewVehicleForm);
document.getElementById('search').addEventListener('input', (e)=>{
  searchTerm = e.target.value;
  renderSidebar();
});
document.getElementById('btnExport').addEventListener('click', exportData);
document.getElementById('importFile').addEventListener('change', (e)=>{
  const f = e.target.files[0];
  if(f) importData(f);
  e.target.value = '';
});

/* ---------- adaptation mobile : bascule Liste / Détail ---------- */
function isMobileAtelier(){ return window.matchMedia('(max-width:768px)').matches; }
function setMobileViewAtelier(view){
  document.body.setAttribute('data-mview', view);
  const bl = document.getElementById('mviewList');
  const bd = document.getElementById('mviewDetail');
  if(bl && bd){
    bl.classList.toggle('active', view==='list');
    bd.classList.toggle('active', view==='detail');
  }
}
document.getElementById('mviewList').addEventListener('click', ()=>setMobileViewAtelier('list'));
document.getElementById('mviewDetail').addEventListener('click', ()=>setMobileViewAtelier('detail'));
// quand on crée une nouvelle fiche, on bascule vers le détail pour la remplir
document.getElementById('btnNewVehicle').addEventListener('click', ()=>{ if(isMobileAtelier()) setMobileViewAtelier('detail'); });
// vue par défaut sur mobile : la liste
setMobileViewAtelier('list');

loadData();
</script>
